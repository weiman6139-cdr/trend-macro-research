- indicator: appliedTariffRate
  dimension: tradePolicy
  domain: economic
  weight: 0.40
  direction: lower-better
  scoringTier: core
  source: World Bank / WITS
  seriesId: TM.TAX.MRCH.WM.AR.ZS
  seriesUrl: https://data.worldbank.org/indicator/TM.TAX.MRCH.WM.AR.ZS
