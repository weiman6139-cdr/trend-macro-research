  seriesId: TBD
  seriesUrl: TBD
  coveragePct: 0.80
  lastObservedYear: 2024
  license: Mixed (per-source)
  mechanismTestRationale: Rising debt growth indicates deteriorating fiscal trajectory and reduced capacity to finance a shock response.
