  weight: 0.20
  direction: lower-better
  scoringTier: core
  source: IMF
  seriesId: GGXWDG_NGDP_PT
  seriesUrl: https://www.imf.org/external/datamapper/GGXWDG_NGDP_PT@FM/
  coveragePct: 0.90
  lastObservedYear: 2024
  license: Proprietary-with-fair-use
